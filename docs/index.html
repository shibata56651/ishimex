<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社イシメックス | トップページ</title>
<meta name="description" content="株式会社イシメックスの公式サイトです。">
<!--#include virtual="/common/include/head.html" -->
</head>

<body>
  <!--#include virtual="/common/include/header.html" -->

  <main class="str-contents-wrapper str-contents-wrapper--top js-tabindex-target">
    <section class="splide" aria-label="トップページのカルーセル">
        <div class="splide__track">
          <ul class="splide__list">
            <li class="splide__slide">
              <img class="splide__img" src="/images/top/carousel-01.jpg">
            </li>
            <li class="splide__slide">
              <img class="splide__img" src="/images/top/carousel-02.jpg">
            </li>
            <li class="splide__slide">
              <img class="splide__img" src="/images/top/carousel-03.jpg">
            </li>
          </ul>
        </div><!-- /.splide__track -->

        <div class="splide__progress">
          <div class="splide__progress__bar"></div>
        </div><!-- /.splide__progress -->

      <button class="splide__toggle" type="button">
        <span class="splide__toggle__play">Play</span>
        <span class="splide__toggle__pause">Pause</span>
      </button>
    </section>

    <section data-fade-kind="fade" class="section__lead js-fade-roots">
        <div class="lead-contents">
          <span class="lead-top-em"><em>より新しく、より早く</em></span>
          <span class="lead-top-text">最適ソリューションとして提供することに<br>挑戦しています。</span>
        </div><!-- /.lead-contents -->
    </section>

    <section data-fade-kind="fade" class="section__base js-fade-roots">
      <h2 class="top__hdg">お知らせ<span class="top__hdg--en">news</span></h2>

      <div class="news-desc">
          <div>
            <div class="news-contents-list js-data-content" data-display-category="all" data-display-length="5"></div><!-- /.news-contents-list -->
          </div>
      </div><!-- /.news-desc -->

      <span class="normal-link"><a href="/news/" class="normal-link__link"><span class="normal-link__link-text">お知らせ一覧へ</span></a></span>
    </section>

    <section data-fade-kind="fade" class="section__base js-fade-roots" id="anchor-01">
      <h2 class="top__hdg">サービス・製品<span class="top__hdg--en">products</span></h2>

      <p>当社では、シーケンス設計・機構設計・回路設計・アートワーク設計・ソフト開発・を行う開発部・技術部と基板実装・配線・組立を行う生産部があります。社内設計したものを同時に社内加工してしているので製造しやすさを考慮した効果的な設計・組立が行われています。社内で連携しているので外部に情報が漏れることもありません。</p>

      <div class="top-service-list">
        <ul class="top-service-list__wrap">
          <li class="top-service-list__list">
            <a class="top-service-list__link" href="/products/#tab-01">
              <span class="top-service-list__img-wrap">
                <img class="top-service-list__img" src="/images/icon/top-icon-01.png" alt="">
              </span>
              <span class="top-service-list__text">電子回路基板</span>
            </a>
          </li>
          <li class="top-service-list__list">
            <a class="top-service-list__link" href="/products/#tab-02">
              <span class="top-service-list__img-wrap">
                <img class="top-service-list__img" src="/images/icon/top-icon-02.png" alt="">
              </span>
              <span class="top-service-list__text">計測装置</span>
            </a>
          </li>
          <li class="top-service-list__list">
            <a class="top-service-list__link" href="/products/#tab-03">
              <span class="top-service-list__img-wrap">
                <img class="top-service-list__img" src="/images/icon/top-icon-03.png" alt="">
              </span>
              <span class="top-service-list__text">産業機械電装関連</span>
            </a>
          </li>
          <li class="top-service-list__list">
            <a class="top-service-list__link" href="/products/#tab-04">
              <span class="top-service-list__img-wrap">
                <img class="top-service-list__img" src="/images/icon/top-icon-04.png" alt="">
              </span>
              <span class="top-service-list__text">制御盤</span>
            </a>
          </li>
        </ul>
      </div><!-- /.top-service-list -->

      <span class="normal-link"><a href="/products/" class="normal-link__link"><span class="normal-link__link-text">サービス・製品ページへ</span></a></span>
    </section>
  </main>

  <!--#include virtual="/common/include/footer.html" -->
</body>
</html>
